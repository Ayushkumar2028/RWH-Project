services:
  # ─────────────────────────────────────────────
  # Frontend — Render Static Site
  # ─────────────────────────────────────────────
  - type: web
    name: rwh-frontend
    env: static
    buildCommand: cd rwh-frontend && npm install && npm run build
    staticPublishPath: rwh-frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://rwh-backend.onrender.com/api   # ← update after backend is created

  # ─────────────────────────────────────────────
  # Backend — Render Web Service (Django)
  # ─────────────────────────────────────────────
  - type: web
    name: rwh-backend
    env: python
    region: singapore   # change if you prefer: oregon, frankfurt, ohio
    plan: free
    buildCommand: >
      cd rwh-backend &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --no-input &&
      python manage.py migrate
    startCommand: cd rwh-backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: rwh-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://rwh-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"
