<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Raindrop/house combined icon for RWH -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)" />
  <!-- Roof triangle -->
  <polygon points="50,18 18,46 82,46" fill="white" opacity="0.95" />
  <!-- House body -->
  <rect x="28" y="46" width="44" height="30" rx="2" fill="white" opacity="0.95" />
  <!-- Door -->
  <rect x="42" y="58" width="16" height="18" rx="2" fill="#2563eb" />
  <!-- Raindrop (water) symbol centered on door -->
  <ellipse cx="50" cy="62" rx="4" ry="5" fill="white" opacity="0.9" />
</svg>